version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: signup-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    container_name: signup-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongo:27017/
    depends_on:
      - mongo

  app:
    build: .
    container_name: signup-app
    ports:
      - "8082:8080"
    depends_on:
      - mongo

volumes:
  mongo-data: